name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Flutter
      uses: flutter-actions/setup-flutter@v2
      with:
        channel: 'stable'
        version: '3.24.5'
        cache: true
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Check project structure
      run: |
        echo "=== 项目结构 ==="
        ls -la
        echo "\\n=== 依赖列表 ==="
        cat pubspec.yaml | grep -A20 "dependencies:"
    
    - name: Build debug APK (测试)
      run: flutter build apk --debug
    
    - name: Upload debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: alist-enhanced-debug-apk
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 30
    
    - name: Build release APK
      if: success()
      run: flutter build apk --release
    
    - name: Upload release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: alist-enhanced-release-apk
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 30
    
    - name: Build summary
      if: always()
      run: |
        echo "=== 构建总结 ==="
        echo "状态: ${{ job.status }}"
        echo "时间: $(date)"
